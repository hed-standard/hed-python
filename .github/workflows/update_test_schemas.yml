name: Update Test Schemas

on:
  workflow_dispatch:
    inputs:
      format:
        description: 'Schema format to copy'
        required: true
        default: 'mediawiki'
        type: choice
        options:
          - mediawiki
          - xml
          - json
          - tsv
      include_libraries:
        description: 'Include library schemas'
        required: false
        default: false
        type: boolean

jobs:
  update-schemas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Update test schemas
        run: |
          LIBRARY_FLAG=""
          if [ "${{ inputs.include_libraries }}" == "true" ]; then
            LIBRARY_FLAG="--library"
          fi
          python tests/helpers/update_test_schemas.py --format ${{ inputs.format }} $LIBRARY_FLAG
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Update test schemas from hed-schemas submodule'
          title: 'Update ${{ inputs.format }} test schemas'
          body: |
            Automated update of test schemas from hed-schemas submodule.
            
            - Format: ${{ inputs.format }}
            - Include libraries: ${{ inputs.include_libraries }}
            
            This PR was created by the Update Test Schemas workflow.
          branch: update-test-schemas-${{ github.run_number }}
          delete-branch: true
