name: CI_COV

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:

  build:
    strategy:
      matrix:
        platform: [ubuntu-latest]
        python-version: [ "3.10" ]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create virtual environment
        run: |
          uv venv --clear .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      # Install dependencies
      - name: Install dependencies
        run: uv pip install -e ".[docs,test]"

      # Run unittest with coverage
      - name: Test with unittest and coverage
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |  
          coverage run -m unittest discover tests

      # Run spec tests with coverage
      - name: Run spec_test coverage
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |  
          coverage run --append -m unittest discover spec_tests
          coverage xml

      # Upload coverage to qlty
      - name: Upload coverage to qlty
        uses: qltysh/qlty-action/coverage@08a0a862c159eae9b9003081da6663d96efef637 # v2
        with:
          oidc: true
          files: coverage.xml
