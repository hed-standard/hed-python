name: CI_COV

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:

  build:
    strategy:
      matrix:
        platform: [ubuntu-latest]
        python-version: [ "3.10" ]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create virtual environment
        run: |
          uv venv --clear .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      # Install dependencies
      - name: Install dependencies
        run: uv pip install -e ".[docs,test]"

      # Run unittest with coverage
      - name: Test with unittest and coverage
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |  
          coverage run -m unittest discover tests

      # Run spec tests with coverage
      - name: Run spec_test coverage
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |  
          coverage run --append -m unittest discover spec_tests
          coverage xml

      # Upload coverage to qlty
      - name: Upload coverage to qlty
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2
        with:
          oidc: true
          files: coverage.xml
