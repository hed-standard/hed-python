name: CI_COV

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:

  build:
    strategy:
      matrix:
        platform: [ubuntu-latest]
        python-version: [ "3.10" ]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create virtual environment
        run: |
          uv venv --clear .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      # Install dependencies
      - name: Install dependencies
        run: uv pip install -e ".[docs,test]"

      # Run unittest with coverage
      - name: Test with unittest and coverage
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |  
          coverage run -m unittest discover tests

      # Run spec tests with coverage
      - name: Run spec_test coverage
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |  
          coverage run --append -m unittest discover spec_tests
          coverage xml

      # Upload coverage to qlty
      - name: Upload coverage to qlty
        uses: qltysh/qlty-action/coverage@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v2
        with:
          oidc: true
          files: coverage.xml
